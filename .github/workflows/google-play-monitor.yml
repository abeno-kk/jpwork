name: Google Play 每日檢查

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: google-play-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 讀取儲存庫
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 取得 Google Play 下載數
        run: node scripts/check-google-play.mjs

      - name: 儲存最新結果
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add google-play-results.json
          if git diff --cached --quiet; then
            echo "No result changes"
          else
            git commit -m "更新 Google Play 下載數"
            git push
          fi
